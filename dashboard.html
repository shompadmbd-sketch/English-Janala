<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala - Login & Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="card bg-base-100 w-full max-w-sm shadow-2xl p-8 border border-gray-200">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-[#422AD5]">English Janala</h1>
            <p class="text-gray-500 mt-2">আপনার ইংরেজি শেখার যাত্রা শুরু হোক এখানে</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold">আপনার নাম</span>
                </label>
                <input type="text" id="user-name" placeholder="আপনার নাম লিখুন" class="input input-bordered focus:border-[#422AD5]" required />
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text font-semibold">পাসওয়ার্ড</span>
                </label>
                <input type="password" id="user-password" placeholder="পাসওয়ার্ড দিন" class="input input-bordered focus:border-[#422AD5]" required />
            </div>

            <div class="form-control mt-6">
                <button type="submit" class="btn bg-[#422AD5] text-white hover:bg-[#341f9e] border-none">
                    Get Started
                </button>
            </div>
        </form>

        <p class="text-center mt-4 text-xs text-gray-400">
            *যে নাম ও পাসওয়ার্ড দিবেন তা দিয়ে পরবর্তীতে লগইন করতে পারবেন।
        </p>
    </div>

    <script>
        document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('user-name').value.trim();
            const pass = document.getElementById('user-password').value;

            
            const existingUser = localStorage.getItem('registeredUser');
            const userData = JSON.parse(existingUser);

            if (!existingUser) {
               
                const newUser = { userName: name, userPass: pass };
                localStorage.setItem('registeredUser', JSON.stringify(newUser));
                localStorage.setItem('learnerName', name);
                
                alert("স্বাগতম! আপনার একাউন্ট তৈরি হয়েছে।");
               
                window.location.assign("./index.html"); 
            } else {
               
                if (userData.userName === name && userData.userPass === pass) {
                    localStorage.setItem('learnerName', name);
                    window.location.assign("./index.html");
                } else if (userData.userName === name && userData.userPass !== pass) {
                    alert("ভুল পাসওয়ার্ড! সঠিক পাসওয়ার্ড দিয়ে চেষ্টা করুন।");
                } else {
                    
                    if(confirm("এই নামে অন্য একাউন্ট নেই। নতুন একাউন্ট খুলতে চান?")) {
                        const newUser = { userName: name, userPass: pass };
                        localStorage.setItem('registeredUser', JSON.stringify(newUser));
                        localStorage.setItem('learnerName', name);
                        window.location.assign("./index.html");
                    }
                }
            }
        });
    </script>

</body>
</html>
